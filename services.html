      <h1>Marine Services on San Francisco Bay</h1>
      <p>Professional hull cleaning, boat detailing, private sailing instruction, and vessel deliveries. Serving marinas across the Bay Area. USCG Licensed Master · US Sailing Cruising Instructor · Nearly 20 years on San Francisco Bay.</p>

      <h2><a href="/hull-cleaning">Hull Cleaning</a></h2>
      <p>Subscription hull cleaning, inspections, propeller service, and item recovery. Professional underwater hull cleaning for sailboats and powerboats at Berkeley Marina, Oakland, Alameda, Emeryville, Richmond, San Francisco, and Sausalito marinas. Includes zinc anode inspection, propeller cleaning, and before/after GoPro video.</p>

      <h2><a href="/boat-detailing">Boat Detailing</a></h2>
      <p>Wash, wax, brightwork, teak, and interior — sail and power. Complete above-waterline boat detailing services serving Berkeley, Emeryville, Richmond, and Oakland marinas. Instant estimates available.</p>

      <h2><a href="/sailing-lessons">Sailing Lessons</a></h2>
      <p>Private lessons on SF Bay — docking to offshore passage making. Learn to sail with a US Sailing certified instructor. Private and small-group sailing lessons from basic keelboat to offshore passage making. Nearly 20 years of teaching experience.</p>

      <h2><a href="/deliveries">Vessel Deliveries</a></h2>
      <p>Professional delivery, West Coast and beyond. USCG Licensed Master with extensive coastal and offshore passage experience.</p>
